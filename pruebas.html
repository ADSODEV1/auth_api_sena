<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pruebas API - Joel Castro</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
        .card { border: 1px solid #ddd; padding: 20px; margin: 20px 0; border-radius: 8px; }
        input { width: 100%; padding: 8px; margin: 5px 0; box-sizing: border-box; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        .resultado { background: #f4f4f4; padding: 10px; margin-top: 10px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>Pruebas API de Autenticación</h1>
    
    <!-- Formulario de Registro -->
    <div class="card">
        <h2>Registro de Usuario</h2>
        <input type="text" id="reg_usuario" placeholder="Usuario">
        <input type="password" id="reg_password" placeholder="Contraseña">
        <button onclick="registrar()">Registrar</button>
        <div id="resultado_registro" class="resultado"></div>
    </div>

    <!-- Formulario de Login -->
    <div class="card">
        <h2>Inicio de Sesión</h2>
        <input type="text" id="login_usuario" placeholder="Usuario">
        <input type="password" id="login_password" placeholder="Contraseña">
        <button onclick="login()">Iniciar Sesión</button>
        <div id="resultado_login" class="resultado"></div>
    </div>

    <script>
        // Función para registrar usuario
        async function registrar() {
            const usuario = document.getElementById('reg_usuario').value;
            const password = document.getElementById('reg_password').value;
            
            try {
                const response = await fetch('register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario, password })
                });
                const data = await response.json();
                document.getElementById('resultado_registro').textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                document.getElementById('resultado_registro').textContent = 'Error: ' + error.message;
            }
        }

        // Función para iniciar sesión
        async function login() {
            const usuario = document.getElementById('login_usuario').value;
            const password = document.getElementById('login_password').value;
            
            try {
                const response = await fetch('login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario, password })
                });
                const data = await response.json();
                document.getElementById('resultado_login').textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                document.getElementById('resultado_login').textContent = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
